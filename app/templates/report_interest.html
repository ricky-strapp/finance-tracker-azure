{% extends "layout.html" %}
{% block title %}Interest Projections — Finance Tracker{% endblock %}

{% block content %}
<div class="p-8">

    <h1 class="text-2xl font-semibold mb-6">Interest Projections</h1>

    <!-- No eligible accounts notice -->
    <div id="no-accounts-notice" class="hidden bg-gray-900 border border-gray-800 rounded-xl p-8 text-center">
        <p class="text-gray-400 font-medium mb-1">No accounts with interest rates</p>
        <p class="text-sm text-gray-600">Add an interest rate (AER %) to a savings or ISA account to see projections here.</p>
        <a href="/accounts" class="inline-block mt-4 text-sm text-blue-400 hover:text-blue-300">Go to Accounts →</a>
    </div>

    <!-- Main content -->
    <div id="summary-section" class="hidden">

        <!-- Summary cards row -->
        <div id="summary-cards" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6"></div>

        <!-- Combined projection chart -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-6">
            <canvas id="projectionChart" height="80"></canvas>
            <div id="chart-toggles" class="flex flex-wrap gap-2 mt-4"></div>
        </div>

        <!-- Per-account accordion sections (Total first, then individual) -->
        <div id="account-sections"></div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
    const COLOURS = [
        "#60a5fa","#34d399","#f59e0b","#f87171",
        "#c084fc","#fb923c","#4ade80","#38bdf8",
        "#a78bfa","#f472b6","#94a3b8","#fbbf24"
    ];

    function fmt(val) {
        return "£" + val.toLocaleString("en-GB", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtSmall(val) {
        if (Math.abs(val) < 1) return "£" + val.toFixed(4);
        return fmt(val);
    }

    // -----------------------------------------------------------------------
    // Accordion toggle
    // -----------------------------------------------------------------------

    function toggleAccountRows(sectionId, chevronId) {
        const section  = document.getElementById(sectionId);
        const chevron  = document.getElementById(chevronId);
        const isHidden = section.classList.contains("hidden");
        section.classList.toggle("hidden", !isHidden);
        chevron.style.transform = isHidden ? "rotate(90deg)" : "";
    }

    // -----------------------------------------------------------------------
    // Chart dataset toggle
    // -----------------------------------------------------------------------

    function toggleDataset(dsIndex) {
        const chart = window._projChart;
        if (!chart) return;
        const meta = chart.getDatasetMeta(dsIndex);
        meta.hidden = !meta.hidden;
        chart.update();
        document.getElementById(`chart-toggle-${dsIndex}`).classList.toggle("opacity-40", meta.hidden);
    }

    function toggleAllInterestAccounts() {
        const chart = window._projChart;
        const items = window._interestToggleItems;
        if (!chart || !items) return;
        const accountItems = items.filter(item => item.label !== "Total");
        const allVisible   = accountItems.every(item => !chart.getDatasetMeta(item.dsIndex).hidden);
        accountItems.forEach(item => {
            chart.getDatasetMeta(item.dsIndex).hidden = allVisible;
            const btn = document.getElementById(`chart-toggle-${item.dsIndex}`);
            if (btn) btn.classList.toggle("opacity-40", allVisible);
        });
        chart.update();
        const labelEl = document.getElementById("interest-all-label");
        if (labelEl) labelEl.textContent = allVisible ? "Show all accounts" : "Hide all accounts";
    }

    // -----------------------------------------------------------------------
    // Build accordion HTML — shared by Total and individual accounts
    // -----------------------------------------------------------------------

    function buildAccordion({ id, colour, name, subtitle, headlineStat, headlineLabel, months, rows, footerCols }) {
        const sectionId = `account-rows-${id}`;
        const chevronId = `chevron-${id}`;

        const tableRows = rows.map(r => `
            <tr class="hover:bg-gray-800 transition-colors">
                <td class="px-4 py-2.5 text-gray-400">${r.month}</td>
                <td class="px-4 py-2.5 text-right font-mono text-blue-400">${r.interest}</td>
                <td class="px-4 py-2.5 text-right font-mono text-gray-200">${r.balance}</td>
            </tr>`).join("");

        return `
            <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden mb-4">
                <button onclick="toggleAccountRows('${sectionId}', '${chevronId}')"
                    class="w-full px-6 py-4 flex items-center gap-3 hover:bg-gray-800 transition-colors text-left">
                    <svg id="${chevronId}"
                        class="w-4 h-4 text-gray-500 flex-shrink-0 transition-transform duration-200"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                    <span class="w-3 h-3 rounded-full flex-shrink-0" style="background:${colour}"></span>
                    <div class="flex-1 min-w-0">
                        <p class="font-medium text-gray-100">${name}</p>
                        <p class="text-xs text-gray-500 mt-0.5">${subtitle}</p>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <p class="text-xs text-gray-500 mb-0.5">${headlineLabel}</p>
                        <p class="font-mono font-semibold text-blue-400">${headlineStat}</p>
                    </div>
                </button>

                <div id="${sectionId}" class="hidden">
                    <div class="overflow-x-auto border-t border-gray-800">
                        <table class="w-full text-sm table-fixed">
                            <thead>
                                <tr class="text-gray-500 border-b border-gray-800">
                                    <th class="text-left px-4 py-2.5 font-medium">Month</th>
                                    <th class="text-right px-4 py-2.5 font-medium">Remaining Interest Projection</th>
                                    <th class="text-right px-4 py-2.5 font-medium">Projected balance</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-800">
                                <tr class="bg-gray-800/50">
                                    <td class="px-4 py-2.5 text-gray-500 italic">Now</td>
                                    <td class="px-4 py-2.5 text-right font-mono text-gray-600 italic text-xs">Current balance</td>
                                    <td class="px-4 py-2.5 text-right font-mono text-gray-400">${footerCols.nowBalance}</td>
                                </tr>
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                    <div class="border-t border-gray-800">
                        <table class="w-full text-sm table-fixed">
                            <tfoot>
                                <tr class="bg-gray-800">
                                    <td class="px-4 py-3 font-semibold text-gray-300">Total / Final</td>
                                    <td class="px-4 py-3 text-right font-mono font-semibold text-blue-400">${footerCols.totalInterest}</td>
                                    <td class="px-4 py-3 text-right font-mono font-semibold text-gray-100">${footerCols.finalBalance}</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>`;
    }

    // -----------------------------------------------------------------------
    // Main load
    // -----------------------------------------------------------------------

    async function load() {
        const res  = await fetch("/api/reports/interest-projections");
        const data = await res.json();

        if (!data.accounts || data.accounts.length === 0) {
            document.getElementById("no-accounts-notice").classList.remove("hidden");
            return;
        }

        document.getElementById("summary-section").classList.remove("hidden");

        const multiAccount      = data.accounts.length > 1;
        const thisMonthInterest = data.estimated_interest_full_month;
        const sortedAccounts    = [...data.accounts].sort((a, b) => b.current_balance - a.current_balance);

        // --- Summary cards ---
        document.getElementById("summary-cards").innerHTML = `
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
                <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Interest-bearing balance</p>
                <p class="text-2xl font-mono font-semibold text-emerald-400">${fmt(data.total_current)}</p>
                <p class="text-xs text-gray-600 mt-1">${multiAccount
                    ? `across ${data.accounts.length} accounts`
                    : `${data.accounts[0].name} · ${data.accounts[0].interest_rate}% AER`}</p>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
                <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Est. interest this month</p>
                <p class="text-2xl font-mono font-semibold text-blue-400">${fmt(thisMonthInterest)}</p>
                <p class="text-xs text-gray-600 mt-1">${data.months[0]}</p>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
                <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Blended rate</p>
                <p class="text-2xl font-mono font-semibold text-blue-400">${data.blended_rate}%</p>
                <p class="text-xs text-gray-600 mt-1">effective AER</p>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
                <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Annual earning power</p>
                <p class="text-2xl font-mono font-semibold text-blue-400">${fmt(data.annual_earning_power)}</p>
                <p class="text-xs text-gray-600 mt-1">based on current balances & rates</p>
            </div>
        `;

        // --- Chart ---
        // Prepend "Now" as the anchor point, then 12 projected months
        const chartLabels = ["Now", ...data.months];
        const datasets    = [];

        if (multiAccount) {
            // Total line: Now = total_current, then total_projected
            datasets.push({
                label:            "Total",
                data:             [data.total_current, ...data.total_projected],
                borderColor:      "#ffffff",
                backgroundColor:  "rgba(255,255,255,0.05)",
                borderWidth:      2.5,
                pointRadius:      3,
                pointHoverRadius: 5,
                tension:          0.3,
                fill:             false,
                borderDash:       [4, 2]
            });
        }

        sortedAccounts.forEach((account, i) => {
            const colour = COLOURS[i % COLOURS.length];
            datasets.push({
                label:            account.name,
                data:             [account.current_balance, ...account.projected_balances],
                borderColor:      colour,
                backgroundColor:  colour + "22",
                borderWidth:      2,
                pointRadius:      3,
                pointHoverRadius: 5,
                tension:          0.3,
                fill:             false
            });
        });

        const projChart = new Chart(
            document.getElementById("projectionChart").getContext("2d"), {
            type: "line",
            data: { labels: chartLabels, datasets },
            options: {
                responsive: true,
                interaction: { mode: "index", intersect: false },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: "#1f2937",
                        titleColor:      "#f3f4f6",
                        bodyColor:       "#d1d5db",
                        borderColor:     "#374151",
                        borderWidth:     1,
                        callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)}` }
                    }
                },
                scales: {
                    x: {
                        grid:  { color: "rgba(255,255,255,0.05)" },
                        ticks: { color: "#6b7280", font: { size: 11 } }
                    },
                    y: {
                        grid:  { color: "rgba(255,255,255,0.05)" },
                        ticks: { color: "#6b7280", font: { size: 11 },
                            callback: v => "£" + v.toLocaleString("en-GB") }
                    }
                }
            }
        });

        // Hide individual accounts by default when multiple
        if (multiAccount) {
            sortedAccounts.forEach((_, i) => {
                projChart.getDatasetMeta(i + 1).hidden = true;
            });
            projChart.update();
        }

        // --- Chart toggles ---
        const toggleItems = [];
        if (multiAccount) toggleItems.push({ label: "Total", colour: "#ffffff", dsIndex: 0 });
        sortedAccounts.forEach((account, i) => {
            toggleItems.push({
                label:   account.name,
                colour:  COLOURS[i % COLOURS.length],
                dsIndex: multiAccount ? i + 1 : i
            });
        });

        const totalToggle = multiAccount ? `
            <button id="chart-toggle-0" onclick="toggleDataset(0)"
                class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-sm transition-colors"
                style="border-color:#ffffff; color:#ffffff;">
                <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 bg-white"></span>Total
            </button>` : "";

        const accountToggleButtons = toggleItems
            .filter(item => item.label !== "Total")
            .map(item => `
                <button id="chart-toggle-${item.dsIndex}" onclick="toggleDataset(${item.dsIndex})"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-sm transition-colors opacity-40"
                    style="border-color:${item.colour}; color:${item.colour};">
                    <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${item.colour}"></span>
                    ${item.label}
                </button>`).join("");

        document.getElementById("chart-toggles").innerHTML = `
            <div class="flex flex-wrap gap-2">
                ${totalToggle}
                ${accountToggleButtons}
            </div>
            ${multiAccount ? `
            <div class="flex justify-end mt-3">
                <button onclick="toggleAllInterestAccounts()"
                    class="px-4 py-1.5 text-sm font-medium text-gray-400 hover:text-white transition-colors">
                    <span id="interest-all-label">Show all accounts</span>
                </button>
            </div>` : ""}
        `;

        window._projChart           = projChart;
        window._interestToggleItems = toggleItems;

        // --- Accordion sections ---
        const sectionsEl = document.getElementById("account-sections");
        let accordionsHtml = "";

        // Total accordion — only when multiple accounts
        if (multiAccount) {
            const totalRows = data.months.map((month, mi) => ({
                month,
                interest: fmtSmall(
                    sortedAccounts.reduce((sum, a) => sum + a.monthly_interest[mi], 0)
                ),
                balance: fmt(data.total_projected[mi])
            }));

            const totalInterestSum = sortedAccounts.reduce((sum, a) => sum + a.total_interest_12m, 0);

            accordionsHtml += buildAccordion({
                id:             "total",
                colour:         "#ffffff",
                name:           "Total",
                subtitle:       `All ${data.accounts.length} accounts combined`,
                headlineStat:   fmt(totalInterestSum),
                headlineLabel:  "Projected interest (12 months)",
                months:         data.months,
                rows:           totalRows,
                footerCols: {
                    nowBalance:    fmt(data.total_current),
                    totalInterest: fmt(totalInterestSum),
                    finalBalance:  fmt(data.total_projected[data.total_projected.length - 1])
                }
            });
        }

        // Individual account accordions
        sortedAccounts.forEach((account, i) => {
            const typeLabel = account.type.replace("_", " ");
            const rows = data.months.map((month, mi) => {
                const interest = account.monthly_interest[mi];
                if (interest <= 0) return null;
                return {
                    month,
                    interest: fmtSmall(interest),
                    balance:  fmt(account.projected_balances[mi])
                };
            }).filter(Boolean);

            accordionsHtml += buildAccordion({
                id:            account.id,
                colour:        COLOURS[i % COLOURS.length],
                name:          account.name,
                subtitle:      `${typeLabel} · ${account.interest_rate}% AER`,
                headlineStat:  fmt(account.total_interest_12m),
                headlineLabel: "Projected interest (12 months)",
                months:        data.months,
                rows,
                footerCols: {
                    nowBalance:    fmt(account.current_balance),
                    totalInterest: fmt(account.total_interest_12m),
                    finalBalance:  fmt(account.projected_balance_12m)
                }
            });
        });

        sectionsEl.innerHTML = accordionsHtml;
    }

    load();
</script>
{% endblock %}
