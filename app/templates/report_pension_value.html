{% extends "layout.html" %}
{% block title %}Pension Value — Finance Tracker{% endblock %}

{% block content %}
<div class="p-8">

    <h1 class="text-2xl font-semibold mb-6">Pension Value Over Time</h1>

    <div class="bg-gray-900 rounded-xl p-6">

        <!-- Controls row -->
        <div class="flex items-center justify-between mb-4 flex-wrap gap-3">

            <!-- Left: timeframe + granularity -->
            <div class="flex items-center gap-3 flex-wrap">

                <!-- Timeframe -->
                <div class="flex rounded-lg overflow-hidden border border-gray-700">
                    <button onclick="setPeriod('all')" id="period-all"
                        class="px-4 py-1.5 text-sm font-medium transition-colors bg-blue-600 text-white">All Time</button>
                    <button onclick="setPeriod('12m')" id="period-12m"
                        class="px-4 py-1.5 text-sm font-medium transition-colors bg-gray-800 text-gray-400">12 Months</button>
                    <button onclick="setPeriod('6m')" id="period-6m"
                        class="px-4 py-1.5 text-sm font-medium transition-colors bg-gray-800 text-gray-400">6 Months</button>
                    <button onclick="setPeriod('3m')" id="period-3m"
                        class="px-4 py-1.5 text-sm font-medium transition-colors bg-gray-800 text-gray-400">3 Months</button>
                    <button onclick="setPeriod('1m')" id="period-1m"
                        class="px-4 py-1.5 text-sm font-medium transition-colors bg-gray-800 text-gray-400">This Month</button>
                </div>

                <!-- Granularity -->
                <div class="flex rounded-lg overflow-hidden border border-gray-700">
                    <button onclick="setGranularity('month')" id="gran-month"
                        class="px-4 py-1.5 text-sm font-medium transition-colors bg-blue-600 text-white">Monthly</button>
                    <button onclick="setGranularity('week')" id="gran-week"
                        class="px-4 py-1.5 text-sm font-medium transition-colors bg-gray-800 text-gray-400">Weekly</button>
                    <button onclick="setGranularity('day')" id="gran-day"
                        class="px-4 py-1.5 text-sm font-medium transition-colors bg-gray-800 text-gray-400">Daily</button>
                </div>

            </div>

            <!-- Right: Line / Bar -->
            <div class="flex rounded-lg overflow-hidden border border-gray-700">
                <button id="pv-btn-line" onclick="setChartType('line')"
                    class="px-4 py-1.5 text-sm font-medium transition-colors bg-blue-600 text-white">Line</button>
                <button id="pv-btn-bar" onclick="setChartType('bar')"
                    class="px-4 py-1.5 text-sm font-medium transition-colors bg-gray-800 text-gray-400">Bar</button>
            </div>

        </div>

        <div class="mb-4">
            <canvas id="pensionValueChart" height="100"></canvas>
        </div>

        <div id="pension-toggles" class="flex flex-wrap gap-2 mt-4"></div>

        <p id="pv-empty" class="text-gray-500 text-sm hidden">
            No pot valuation data yet. Add a pension pot and record some valuations to see history here.
        </p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
    const POT_SUBTYPES = ["workplace", "lisa", "sipp"];

    const COLOURS = [
        "#60a5fa","#34d399","#f59e0b","#f87171",
        "#c084fc","#fb923c","#4ade80","#38bdf8",
        "#a78bfa","#f472b6"
    ];

    let chart            = null;
    let chartType        = "line";
    let chartData        = null;          // raw data from /api/pensions
    let currentPeriod      = "all";
    let currentGranularity = "month";
    let showTotal          = true;
    let pensionVisibility  = {};          // pension id -> bool

    // Same valid-combination rules as Net Worth
    const ALLOWED_GRAN = {
        "all": ["month", "week"],
        "12m": ["month", "week"],
        "6m":  ["month", "week", "day"],
        "3m":  ["month", "week", "day"],
        "1m":  ["week", "day"],
    };

    // -----------------------------------------------------------------------
    // Controls
    // -----------------------------------------------------------------------

    function setPeriod(p) {
        currentPeriod = p;
        ["all","12m","6m","3m","1m"].forEach(id => {
            document.getElementById(`period-${id}`).className =
                `px-4 py-1.5 text-sm font-medium transition-colors ${p === id ? "bg-blue-600 text-white" : "bg-gray-800 text-gray-400"}`;
        });
        const allowed = ALLOWED_GRAN[p];
        if (!allowed.includes(currentGranularity)) {
            currentGranularity = allowed[allowed.length - 1];
        }
        updateGranularityButtons();
        load();
    }

    function setGranularity(g) {
        if (!ALLOWED_GRAN[currentPeriod].includes(g)) return;
        currentGranularity = g;
        updateGranularityButtons();
        load();
    }

    function updateGranularityButtons() {
        const allowed = ALLOWED_GRAN[currentPeriod];
        ["month","week","day"].forEach(g => {
            const btn = document.getElementById(`gran-${g}`);
            const isActive   = g === currentGranularity;
            const isDisabled = !allowed.includes(g);
            if (isDisabled) {
                btn.className = "px-4 py-1.5 text-sm font-medium transition-colors bg-gray-800 text-gray-600 cursor-not-allowed";
            } else if (isActive) {
                btn.className = "px-4 py-1.5 text-sm font-medium transition-colors bg-blue-600 text-white";
            } else {
                btn.className = "px-4 py-1.5 text-sm font-medium transition-colors bg-gray-800 text-gray-400";
            }
        });
    }

    function setChartType(type) {
        chartType = type;
        document.getElementById("pv-btn-line").className =
            `px-4 py-1.5 text-sm font-medium transition-colors ${type === "line" ? "bg-blue-600 text-white" : "bg-gray-800 text-gray-400"}`;
        document.getElementById("pv-btn-bar").className =
            `px-4 py-1.5 text-sm font-medium transition-colors ${type === "bar" ? "bg-blue-600 text-white" : "bg-gray-800 text-gray-400"}`;
        if (chartData) renderChart();
    }

    // -----------------------------------------------------------------------
    // Toggles
    // -----------------------------------------------------------------------

    function toggleTotal() {
        showTotal = !showTotal;
        document.getElementById("toggle-total").classList.toggle("opacity-40", !showTotal);
        renderChart();
    }

    function togglePension(id) {
        pensionVisibility[id] = !pensionVisibility[id];
        document.getElementById(`ptoggle-${id}`).classList.toggle("opacity-40", !pensionVisibility[id]);
        renderChart();
    }

    function toggleAllPensions() {
        const allVisible = chartData.pensions.every(p => pensionVisibility[p.id]);
        chartData.pensions.forEach(p => {
            pensionVisibility[p.id] = !allVisible;
            const btn = document.getElementById(`ptoggle-${p.id}`);
            if (btn) btn.classList.toggle("opacity-40", allVisible);
        });
        document.getElementById("pall-label").textContent =
            allVisible ? "Show all pensions" : "Hide all pensions";
        renderChart();
    }

    // -----------------------------------------------------------------------
    // Chart render
    // -----------------------------------------------------------------------

    function renderChart() {
        const ctx = document.getElementById("pensionValueChart").getContext("2d");
        if (chart) chart.destroy();

        const datasets = [];

        if (showTotal) {
            datasets.push({
                label:            "Total",
                data:             chartData.total,
                borderColor:      "#ffffff",
                backgroundColor:  chartType === "bar" ? "rgba(255,255,255,0.25)" : "rgba(255,255,255,0.05)",
                borderWidth:      chartType === "line" ? 2.5 : 1,
                pointRadius:      chartType === "line" ? (chartData.labels.length > 90 ? 0 : 3) : 0,
                pointHoverRadius: 5,
                tension:          0.3,
                fill:             chartType === "line",
                borderDash:       chartType === "line" ? [4, 2] : [],
                borderRadius:     chartType === "bar" ? 3 : 0,
                order:            0
            });
        }

        chartData.pensions.forEach((pension, i) => {
            if (!pensionVisibility[pension.id]) return;
            const colour = COLOURS[i % COLOURS.length];
            datasets.push({
                label:            pension.name,
                data:             pension.values,
                borderColor:      colour,
                backgroundColor:  chartType === "bar" ? colour + "99" : colour + "11",
                borderWidth:      chartType === "line" ? 1.5 : 1,
                pointRadius:      chartType === "line" ? (chartData.labels.length > 90 ? 0 : 2) : 0,
                pointHoverRadius: 4,
                tension:          0.3,
                fill:             false,
                borderRadius:     chartType === "bar" ? 3 : 0,
                order:            i + 1
            });
        });

        chart = new Chart(ctx, {
            type: chartType,
            data: { labels: chartData.labels, datasets },
            options: {
                responsive: true,
                interaction: { mode: "index", intersect: false },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: "#1f2937",
                        titleColor:      "#f3f4f6",
                        bodyColor:       "#d1d5db",
                        borderColor:     "#374151",
                        borderWidth:     1,
                        callbacks: {
                            label: ctx => ` ${ctx.dataset.label}: £${ctx.parsed.y.toLocaleString("en-GB", {minimumFractionDigits:2})}`
                        }
                    }
                },
                scales: {
                    x: {
                        grid:  { color: "rgba(255,255,255,0.05)" },
                        ticks: { color: "#6b7280", font: { size: 11 }, maxTicksLimit: 24 }
                    },
                    y: {
                        beginAtZero: false,
                        grid:  { color: "rgba(255,255,255,0.05)" },
                        ticks: { color: "#6b7280", font: { size: 11 },
                            callback: v => "£" + v.toLocaleString("en-GB") }
                    }
                }
            }
        });
    }

    // -----------------------------------------------------------------------
    // Data loading
    // -----------------------------------------------------------------------

    async function load() {
        // 1. Fetch all pension accounts with their entries
        const res = await fetch("/api/pensions");
        const allAccounts = await res.json();

        // 2. Filter to pot-type only — these have value_pence
        const pots = allAccounts.filter(a => POT_SUBTYPES.includes(a.subtype) && a.entries?.length > 0);

        const emptyEl = document.getElementById("pv-empty");
        const canvas  = document.getElementById("pensionValueChart");

        if (pots.length === 0) {
            emptyEl.classList.remove("hidden");
            canvas.classList.add("hidden");
            return;
        }

        emptyEl.classList.add("hidden");
        canvas.classList.remove("hidden");

        // 3. Build the snapshot date list client-side (mirrors net-worth-history-v2 logic)
        // The API already returns all entries; we just need to interpolate across a time grid.
        const today = new Date();

        // Determine start date from period
        let startDate;
        if (currentPeriod === "1m") {
            startDate = new Date(today.getFullYear(), today.getMonth(), 1);
        } else if (currentPeriod === "3m") {
            startDate = new Date(today.getFullYear(), today.getMonth() - 3, 1);
        } else if (currentPeriod === "6m") {
            startDate = new Date(today.getFullYear(), today.getMonth() - 6, 1);
        } else if (currentPeriod === "12m") {
            startDate = new Date(today.getFullYear(), today.getMonth() - 12, 1);
        } else {
            // All time — find earliest entry across all pots
            let earliest = null;
            pots.forEach(p => {
                p.entries.forEach(e => {
                    if (!earliest || e.entry_date < earliest) earliest = e.entry_date;
                });
            });
            if (!earliest) { emptyEl.classList.remove("hidden"); return; }
            const [ey, em] = earliest.split("-").map(Number);
            startDate = new Date(ey, em - 1, 1);
        }

        // Build snapshot dates
        const snapshots = [];  // { date: Date, label: string }

        if (currentGranularity === "day") {
            let d = new Date(startDate);
            while (d <= today) {
                snapshots.push({ date: new Date(d) });
                d.setDate(d.getDate() + 1);
            }
        } else if (currentGranularity === "week") {
            // Advance to first Sunday on or after start
            let d = new Date(startDate);
            const daysUntilSun = (7 - d.getDay()) % 7;
            d.setDate(d.getDate() + (daysUntilSun === 0 ? 7 : daysUntilSun));
            while (d <= today) {
                snapshots.push({ date: new Date(d) });
                d.setDate(d.getDate() + 7);
            }
            if (!snapshots.length || snapshots[snapshots.length - 1].date < today) {
                snapshots.push({ date: new Date(today) });
            }
        } else {
            // Monthly — end of each month
            let y = startDate.getFullYear(), m = startDate.getMonth();
            while (true) {
                const lastDay = new Date(y, m + 1, 0);   // last day of month
                const snap = lastDay < today ? lastDay : new Date(today);
                snapshots.push({ date: snap });
                if (lastDay >= today) break;
                m++;
                if (m > 11) { m = 0; y++; }
            }
        }

        // Format labels
        const fmtLabel = d => {
            if (currentGranularity === "month") return d.toLocaleDateString("en-GB", { month: "short", year: "numeric" });
            return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" });
        };

        const labels = snapshots.map(s => fmtLabel(s.date));

        // 4. For each pension, build value series via last-known-value interpolation
        const toDateStr = d =>
            d.getFullYear() + "-" +
            String(d.getMonth() + 1).padStart(2, "0") + "-" +
            String(d.getDate()).padStart(2, "0");

        const pensionSeries = pots.map(p => {
            // Sort entries ASC by date
            const sorted = [...p.entries]
                .filter(e => !e.is_void)
                .sort((a, b) => a.entry_date.localeCompare(b.entry_date));

            // For each snapshot, find the last entry on or before that date
            
            const values = snapshots.map(s => {
            const asOf = toDateStr(s.date);
            
            let lastVal = null; // <-- FIX: reset per snapshot
                for (let i = sorted.length - 1; i >= 0; i--) {
                    if (sorted[i].entry_date <= asOf) {
                        lastVal = sorted[i].value_pence / 100;
                        break;
                    }
                }
                return lastVal;
            });

            return { id: p.id, name: p.name, values };
        }).filter(p => p.values.some(v => v !== null));

        // 5. Total series — sum of all pots at each snapshot (treat null as 0)
        const totalValues = snapshots.map((_, i) =>
            pensionSeries.reduce((sum, p) => {
            return sum + (p.values[i] !== null ? p.values[i] : 0);
        }, 0)
        );

        chartData = { labels, total: totalValues, pensions: pensionSeries };

        // 6. Initialise visibility for new pensions (hidden by default; total shown)
        pensionSeries.forEach(p => {
            if (!(p.id in pensionVisibility)) pensionVisibility[p.id] = false;
        });

        // 7. Build toggle buttons (only on first load — they don't change)
        if (!document.getElementById("toggle-total")) {
            const pensionButtons = pensionSeries.map((p, i) => {
                const colour = COLOURS[i % COLOURS.length];
                return `
                    <button id="ptoggle-${p.id}" onclick="togglePension(${p.id})"
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-sm transition-colors opacity-40"
                        style="border-color:${colour}; color:${colour};">
                        <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${colour}"></span>
                        ${p.name}
                    </button>`;
            }).join("");

            document.getElementById("pension-toggles").innerHTML = `
                <div class="flex flex-wrap gap-2">
                    <button id="toggle-total" onclick="toggleTotal()"
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-sm transition-colors"
                        style="border-color:#ffffff; color:#ffffff;">
                        <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 bg-white"></span>
                        Total
                    </button>
                    ${pensionButtons}
                </div>
                <div class="flex justify-end mt-3">
                    <button id="pall-toggle-btn" onclick="toggleAllPensions()"
                        class="px-4 py-1.5 text-sm font-medium text-gray-400 hover:text-white transition-colors">
                        <span id="pall-label">Show all pensions</span>
                    </button>
                </div>
            `;
        }

        renderChart();
    }

    load();
</script>
{% endblock %}
